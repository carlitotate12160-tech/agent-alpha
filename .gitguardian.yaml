# GitGuardian configuration
# Ignore false positives for environment variable references in docker-compose.yml
# These are not actual secrets but environment variable placeholders
secrets-ignore:
  - name: Generic Password
    paths:
      - "infra/docker-compose.yml"
  - name: Username Password
    paths:
      - "tests/phase_4/test_git_exposure_probe.py"
      - "tests/phase_4/test_git_exposure_wiring.py"


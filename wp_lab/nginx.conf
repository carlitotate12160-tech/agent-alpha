worker_processes auto;
events { worker_connections 1024; }

http {
    access_log /var/log/nginx/access.log;
    log_format cotenant '$remote_addr - $remote_user [$time_local] "$request"';

    # ── Shared TLS cert (wildcard *.wp.lab) ────────────────────────────
    ssl_certificate     /etc/nginx/certs/wp-lab.crt;
    ssl_certificate_key /etc/nginx/certs/wp-lab.key;

    # ── Default: proxy to WordPress Apache ─────────────────────────────
    # Used by all in-scope vhosts; per-vhost location blocks override
    # backup-path responses before the proxy catch-all.

    # ── cotenant.wp.lab — separate docroot, own access log ─────────────
    server {
        listen 443 ssl;
        server_name cotenant.wp.lab;
        access_log /var/log/nginx/cotenant.access.log cotenant;

        root /etc/nginx/exposed/cotenant;
        location / {
            try_files $uri $uri/ =404;
        }
    }

    # ── vuln.wp.lab — real .swp backup with valid creds ────────────────
    server {
        listen 443 ssl;
        server_name vuln.wp.lab;

        location /wp-config.php.swp {
            alias /etc/nginx/exposed/vuln/wp-config.php.swp;
            default_type text/plain;
        }
        location / {
            proxy_pass http://wordpress:80;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ── rotated.wp.lab — real .swp backup with STALE creds ─────────────
    server {
        listen 443 ssl;
        server_name rotated.wp.lab;

        location /wp-config.php.swp {
            alias /etc/nginx/exposed/rotated/wp-config.php.swp;
            default_type text/plain;
        }
        location / {
            proxy_pass http://wordpress:80;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ── decoy.wp.lab — 200 junk (no DB creds, anti-#3) ─────────────────
    server {
        listen 443 ssl;
        server_name decoy.wp.lab;

        location /wp-config.php.bak {
            alias /etc/nginx/exposed/decoy/wp-config.php.bak;
            default_type text/html;
        }
        location / {
            proxy_pass http://wordpress:80;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ── waf.wp.lab — 403 on all backup paths (WAF control) ─────────────
    server {
        listen 443 ssl;
        server_name waf.wp.lab;

        location /wp-config {
            return 403;
        }
        location / {
            proxy_pass http://wordpress:80;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ── hardened.wp.lab — 404 on all backup paths (no false positive) ──
    server {
        listen 443 ssl;
        server_name hardened.wp.lab;

        location /wp-config {
            return 404;
        }
        location / {
            proxy_pass http://wordpress:80;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}

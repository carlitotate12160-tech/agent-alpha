[options]
; Lab-only. list_db = True is REQUIRED for slice 1d: it makes XML-RPC db.list()
; return the real db name → OdooAccessTool records db_source="enumerated"
; (the 1d chain gate only chains ENUMERATED, never a guessed db).
admin_passwd = ${ODOO_MASTER_PASSWORD}
db_host = db
db_user = odoo
db_password = odoo
list_db = True
; proxy_mode makes Odoo TRUST X-Forwarded-Proto from nginx, so redirect Location
; URLs are https (not http:80 → connection-refused → Alpha 'unreachable'). BOTH the
; nginx header AND this line are required — the header alone is ignored without it.
proxy_mode = True
; keep it small/quiet for the lab
workers = 0

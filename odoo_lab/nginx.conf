events {}
http {
  server {
    listen 443 ssl;
    server_name vuln.odoo.lab;
    ssl_certificate     /etc/nginx/certs/odoo-lab.crt;
    ssl_certificate_key /etc/nginx/certs/odoo-lab.key;

    # LEAK vector: expose the wp-config.php.bak bait (wp_config_probe GETs this).
    location = /wp-config.php.bak {
      root /etc/nginx/exposed/vuln;
      default_type text/plain;
    }
    # ACCESS vector: proxy everything else (incl. /xmlrpc/2/*) to Odoo.
    location / {
      proxy_pass http://odoo:8069;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_redirect http:// https://;
    }
  }

  server {
    listen 443 ssl;
    server_name hardened.odoo.lab;
    ssl_certificate     /etc/nginx/certs/odoo-lab.crt;
    ssl_certificate_key /etc/nginx/certs/odoo-lab.key;
    # NO bait exposed here → no leak → chain must fail (true-negative).
    location / {
      proxy_pass http://odoo:8069;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_redirect http:// https://;
    }
  }

  # alpha-ai.web.id — external access through Cloudflare (A1 validation target)
  server {
    listen 443 ssl;
    server_name alpha-ai.web.id;
    ssl_certificate     /etc/nginx/certs/odoo-lab.crt;
    ssl_certificate_key /etc/nginx/certs/odoo-lab.key;

    # LEAK vector: expose the wp-config.php.bak bait (wp_config_probe GETs this).
    location = /wp-config.php.bak {
      root /etc/nginx/exposed/vuln;
      default_type text/plain;
    }
    # ACCESS vector: proxy everything else (incl. /xmlrpc/2/*) to Odoo.
    location / {
      proxy_pass http://odoo:8069;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_redirect http:// https://;
    }
  }
}

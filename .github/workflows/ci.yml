# Agent-Alpha CI — optimized (2026-07-11)
#
# Two jobs:
#   quality-gate    — lint + typecheck + bandit + pip-audit + gitleaks + full test suite
#                     (BLOCKING — branch protection requires this check)
#   security-audit  — Trivy container scan + Syft SBOM + Nuclei DAST
#                     (non-blocking, needs quality-gate, continue-on-error)
#
# Optimizations vs the monolithic P2 seal version:
#   - Pip/venv cached via actions/cache (saves ~1-2 min of pip install per run)
#   - Security tool binaries (Trivy/Syft/Nuclei) cached (saves ~2-3 min of downloads)
#   - Fast security scans (bandit/pip-audit/gitleaks) stay blocking in quality-gate
#   - Slow security scans (Trivy/Syft/Nuclei) async in security-audit, never block merge
#   - Security-audit skipped entirely if quality-gate fails (needs: quality-gate)
#
# Runs on a SELF-HOSTED runner on the Oracle ARM64 box — the project's hard rule
# is "Oracle ARM64 is the only valid test environment" (anti-Lyndon #9).
#
# The DB passwords below are for EPHEMERAL, localhost-only CI containers — not
# real secrets and never touch production data.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-oracle-box   # single global lock — shared-box runner, prevent 2 CI
                         # runs competing for RAM on 12GB box (updated 2026-07-08)
  cancel-in-progress: false   # JANGAN cancel — partial CI worse than queued

jobs:
  quality-gate:
    runs-on: [self-hosted, linux, ARM64]
    permissions:
      contents: read

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: agent_alpha
          POSTGRES_PASSWORD: test-super-pw
          POSTGRES_DB: agent_alpha
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U agent_alpha -d agent_alpha"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 127.0.0.1:6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache venv + pip
        uses: actions/cache@v4
        with:
          path: |
            .venv
            ~/.cache/pip
          key: venv-arm64-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            venv-arm64-

      - name: Create venv + install deps (Python 3.12)
        run: |
          if [ ! -f .venv/bin/python ]; then
            python3.12 -m venv .venv
            .venv/bin/pip install --upgrade pip
          fi
          .venv/bin/pip install -e . --quiet
          .venv/bin/pip install ruff mypy pytest grpcio-tools bandit pip-audit --quiet

      - name: Generate A2A protobuf stubs (a2a_pb2 is generated, not committed)
        run: make proto

      - name: Lint + typecheck (make check = ruff + ruff format --check + mypy)
        run: make check

      - name: Security scan (bandit — SAST for Python code, all severity)
        # Fail on ALL severity findings except B101/B110/B112 (suppressed via .bandit
        # config — legitimate patterns in offensive tooling: assert in guards,
        # try/except/pass in cleanup, try/except/continue in brute-force loops).
        run: .venv/bin/bandit -r agent_alpha/ -l -ii -c .bandit

      - name: Dependency audit (pip-audit — CVE check on installed packages)
        run: .venv/bin/pip-audit --skip-editable

      - name: Secret scanning (gitleaks — detect hardcoded credentials in repo)
        # .gitleaks.toml (repo root) allowlists CI-only ephemeral DB passwords.
        # continue-on-error: gitleaks-action crashes when zero findings (no sarif).
        # Real secrets caught by GitGuardian (parallel check) + pre-commit hook.
        uses: gitleaks/gitleaks-action@v3
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "true"

      - name: Provision least-privilege DB role (NOSUPERUSER NOBYPASSRLS)
        env:
          PGPASSWORD: test-super-pw
        run: |
          psql -h localhost -p 5433 -U agent_alpha -d agent_alpha -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'agent_alpha_app') THEN
              CREATE ROLE agent_alpha_app LOGIN PASSWORD 'test-app-pw'
                NOSUPERUSER NOBYPASSRLS NOCREATEDB NOCREATEROLE;
            END IF;
          END
          $$;
          GRANT CONNECT ON DATABASE agent_alpha TO agent_alpha_app;
          GRANT USAGE, CREATE ON SCHEMA public TO agent_alpha_app;
          SQL

      - name: Full test suite (all phases + integration, Oracle ARM64)
        env:
          AGENT_ALPHA_REQUIRE_DB: "1"
          AGENT_ALPHA_PG_DSN: "postgresql://agent_alpha_app:test-app-pw@localhost:5433/agent_alpha"
          AGENT_ALPHA_REDIS_URL: "redis://localhost:6380/0"
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: .venv/bin/pytest tests/ -q --cov=agent_alpha --cov-report=term-missing --cov-fail-under=80

  security-audit:
    runs-on: [self-hosted, linux, ARM64]
    needs: quality-gate
    continue-on-error: true
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache venv + pip
        uses: actions/cache@v4
        with:
          path: |
            .venv
            ~/.cache/pip
          key: venv-arm64-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            venv-arm64-

      - name: Create venv + install deps (Python 3.12)
        run: |
          if [ ! -f .venv/bin/python ]; then
            python3.12 -m venv .venv
            .venv/bin/pip install --upgrade pip
          fi
          .venv/bin/pip install -e . --quiet

      - name: Cache security tool binaries
        id: cache-secbin
        uses: actions/cache@v4
        with:
          path: /tmp/secbin
          key: secbin-arm64-v1

      - name: Install security tools (if not cached)
        if: steps.cache-secbin.outputs.cache-hit != 'true'
        run: |
          rm -rf /tmp/secbin
          mkdir -p /tmp/secbin
          # Trivy — direct binary download (install.sh unreliable on self-hosted)
          curl -sfL https://github.com/aquasecurity/trivy/releases/download/v0.50.0/trivy_0.50.0_Linux-ARM64.tar.gz -o /tmp/trivy.tar.gz
          tar xzf /tmp/trivy.tar.gz -C /tmp/secbin trivy
          rm -f /tmp/trivy.tar.gz
          # Syft — direct binary download
          curl -sfL https://github.com/anchore/syft/releases/download/v1.9.0/syft_1.9.0_linux_arm64.tar.gz -o /tmp/syft.tar.gz
          tar xzf /tmp/syft.tar.gz -C /tmp/secbin syft
          rm -f /tmp/syft.tar.gz
          # Nuclei — direct binary download
          curl -sfL https://github.com/projectdiscovery/nuclei/releases/download/v3.3.0/nuclei_3.3.0_linux_arm64.zip -o /tmp/nuclei.zip
          unzip -o /tmp/nuclei.zip -d /tmp/secbin nuclei
          rm -f /tmp/nuclei.zip
          chmod +x /tmp/secbin/*

      - name: Container scan (Trivy — CVE scan on Docker images used in CI)
        continue-on-error: true
        run: |
          export PATH="/tmp/secbin:$PATH"
          trivy image --severity HIGH,CRITICAL --ignore-unfixed pgvector/pgvector:pg16 || true
          trivy image --severity HIGH,CRITICAL --ignore-unfixed redis:7-alpine || true

      - name: Generate SBOM (Syft — Software Bill of Materials)
        run: |
          export PATH="/tmp/secbin:$PATH"
          syft dir:. --output spdx-json=sbom.spdx.json
          syft dir:. --output cyclonedx-json=sbom.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: |
            sbom.spdx.json
            sbom.cyclonedx.json
          retention-days: 90

      - name: DAST scan (Nuclei — scan beta lab app for web vulnerabilities)
        continue-on-error: true
        run: |
          export PATH="/tmp/secbin:$PATH"
          .venv/bin/python -m infra.beta_lab_app &
          APP_PID=$!
          sleep 3
          nuclei -u http://localhost:5000 -severity medium,high,critical -o nuclei-results.txt || true
          kill $APP_PID 2>/dev/null || true
          cat nuclei-results.txt 2>/dev/null || echo "No Nuclei findings"

# Agent-Alpha CI — optimized (2026-07-12)
#
# One job:
#   quality-gate — lint + typecheck + bandit + pip-audit + gitleaks + full test suite
#                  (BLOCKING — branch protection requires this check)
#
# Slow security scans (Trivy/Syft/Nuclei) moved to security-audit.yml (nightly schedule).
# Fast security scans (bandit/pip-audit/gitleaks) stay blocking here.
#
# Runs on a SELF-HOSTED runner on the Oracle ARM64 box — the project's hard rule
# is "Oracle ARM64 is the only valid test environment" (anti-Lyndon #9).
#
# The DB passwords below are for EPHEMERAL, localhost-only CI containers — not
# real secrets and never touch production data.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-oracle-box   # single global lock — shared-box runner, prevent 2 CI
                         # runs competing for RAM on 12GB box (updated 2026-07-08)
  cancel-in-progress: false   # JANGAN cancel — partial CI worse than queued

jobs:
  quality-gate:
    runs-on: [self-hosted, linux, ARM64]
    permissions:
      contents: read

    services:
      postgres:
        # Digest-pinned to pg16-trixie (ARM64) with Go 1.25.12+ to fix CVE-2025-68121 (CRITICAL)
        # and 14 HIGH Go stdlib CVEs. See docs/ADR.md §12.35 for CVE decision + residuals.
        image: pgvector/pgvector:pg16-trixie@sha256:d0b40f6862437359b69f0ed790ce620d0226e220994c0e7349702d04dc1eb548
        env:
          POSTGRES_USER: agent_alpha
          POSTGRES_PASSWORD: test-super-pw
          POSTGRES_DB: agent_alpha
        ports:
          - 127.0.0.1:5433:5432
        options: >-
          --health-cmd "pg_isready -U agent_alpha -d agent_alpha"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:8-alpine
        ports:
          - 127.0.0.1:6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache venv + pip
        uses: actions/cache@v6
        with:
          path: |
            .venv
            ~/.cache/pip
          key: venv-arm64-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            venv-arm64-

      - name: Create venv + install deps (Python 3.12)
        run: |
          if [ ! -f .venv/bin/python ]; then
            python3.12 -m venv .venv
            .venv/bin/pip install --upgrade pip
          fi
          .venv/bin/pip install -e . --quiet
          .venv/bin/pip install ruff mypy pytest grpcio-tools bandit pip-audit --quiet

      - name: Generate A2A protobuf stubs (a2a_pb2 is generated, not committed)
        run: make proto

      - name: Lint + typecheck (make check = ruff + ruff format --check + mypy)
        run: make check

      - name: Documentation status consistency check
        run: .venv/bin/python scripts/check_doc_status.py

      - name: Security scan (bandit — SAST for Python code, all severity)
        # Fail on ALL severity findings except B101/B110/B112 (suppressed via .bandit
        # config — legitimate patterns in offensive tooling: assert in guards,
        # try/except/pass in cleanup, try/except/continue in brute-force loops).
        run: .venv/bin/bandit -r agent_alpha/ -l -ii -c .bandit

      - name: Dependency audit (pip-audit — CVE check on installed packages)
        run: .venv/bin/pip-audit --skip-editable

      - name: Cleanup stale gitleaks tmp (self-hosted runner hygiene)
        # gitleaks-action@v3 downloads+extracts to /tmp/gitleaks.tmp but never
        # cleans it up — the next run finds the stale file and crashes with
        # "Destination file path /tmp/gitleaks.tmp already exists". This is a
        # self-hosted runner issue (no ephemeral /tmp between runs), not a code
        # issue. Remove before the action runs.
        run: rm -f /tmp/gitleaks.tmp /tmp/gitleaks-*/gitleaks 2>/dev/null || true

      - name: Secret scanning (gitleaks — detect hardcoded credentials in repo)
        # .gitleaks.toml (repo root) allowlists CI-only ephemeral DB passwords.
        # continue-on-error: gitleaks-action crashes when zero findings (no sarif).
        # Real secrets caught by GitGuardian (parallel check) + pre-commit hook.
        uses: gitleaks/gitleaks-action@v3
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "true"

      - name: Provision least-privilege DB role (NOSUPERUSER NOBYPASSRLS)
        env:
          PGPASSWORD: test-super-pw
        run: |
          psql -h localhost -p 5433 -U agent_alpha -d agent_alpha -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'agent_alpha_app') THEN
              CREATE ROLE agent_alpha_app LOGIN PASSWORD 'test-app-pw'
                NOSUPERUSER NOBYPASSRLS NOCREATEDB NOCREATEROLE;
            END IF;
          END
          $$;
          GRANT CONNECT ON DATABASE agent_alpha TO agent_alpha_app;
          GRANT USAGE, CREATE ON SCHEMA public TO agent_alpha_app;
          SQL

      - name: Anti-duplication guard (reject local _persist_node/_persist_edge/HttpClientProtocol)
        # BLOCKING (2026-07-12): hoist complete — all callers use graph/persist.py + agents/http_client.py.
        run: |
          set -e
          FAIL=0
          # _persist_node / _persist_edge must only exist in graph/persist.py
          HITS=$(grep -rn "def _persist_node\|def _persist_edge" agent_alpha/ --include="*.py" \
            | grep -v "graph/persist.py" || true)
          if [ -n "$HITS" ]; then
            echo "::error::Duplication violation: _persist_node/_persist_edge found outside graph/persist.py"
            echo "$HITS"
            FAIL=1
          fi
          # HttpClientProtocol must only exist in agents/http_client.py
          HITS=$(grep -rn "class HttpClientProtocol" agent_alpha/ --include="*.py" \
            | grep -v "agents/http_client.py" || true)
          if [ -n "$HITS" ]; then
            echo "::error::Duplication violation: HttpClientProtocol found outside agents/http_client.py"
            echo "$HITS"
            FAIL=1
          fi
          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi
          echo "Anti-duplication guard passed (no duplicates found)."

      - name: Private-attr-access guard (reject hasattr.*_graph patterns)
        # BLOCKING (2026-07-12): the last hasattr._graph was removed in #165
        # (field-prove runners now call the public NetworkXGraphStore.clear()).
        run: |
          HITS=$(grep -rn 'hasattr.*_graph' agent_alpha/ --include="*.py" || true)
          if [ -n "$HITS" ]; then
            echo "::error::Private attr access: use graph_store.clear() instead of hasattr(graph_store, _graph)"
            echo "$HITS"
            exit 1
          fi
          echo "Private-attr-access guard passed (no private _graph access)."

      - name: Full test suite (all phases + integration, Oracle ARM64)
        env:
          AGENT_ALPHA_REQUIRE_DB: "1"
          AGENT_ALPHA_PG_DSN: "postgresql://agent_alpha_app:test-app-pw@localhost:5433/agent_alpha"
          AGENT_ALPHA_REDIS_URL: "redis://localhost:6380/0"
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: .venv/bin/pytest tests/ -q --cov=agent_alpha --cov-report=term-missing --cov-fail-under=80

      - name: CodeRabbit findings report (non-blocking)
        # NON-BLOCKING: collect and display all CodeRabbit review findings
        # so they are visible in CI logs. Does NOT fail the build.
        # Runs only on PRs where CodeRabbit reviews exist.
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR number — skipping CodeRabbit report"
            exit 0
          fi

          echo "=== CodeRabbit Findings Report (PR #$PR_NUMBER) ==="
          echo ""

          # Fetch all top-level review comments from CodeRabbit
          COMMENTS=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER/comments" \
            --jq '.[] | select(.user.login == "coderabbitai[bot]") | select(.in_reply_to_id == null) | .body' 2>/dev/null || true)

          if [ -z "$COMMENTS" ]; then
            echo "No CodeRabbit comments found."
            exit 0
          fi

          # Display each finding with severity classification
          TOTAL=0
          CRITICAL=0
          MAJOR=0
          MINOR=0

          while IFS= read -r comment; do
            TOTAL=$((TOTAL + 1))
            if echo "$comment" | grep -q "🔴 Critical"; then
              CRITICAL=$((CRITICAL + 1))
              echo "── 🔴 CRITICAL ──"
            elif echo "$comment" | grep -q "🟠 Major"; then
              MAJOR=$((MAJOR + 1))
              echo "── 🟠 MAJOR ──"
            elif echo "$comment" | grep -q "🟡 Minor"; then
              MINOR=$((MINOR + 1))
              echo "── 🟡 MINOR ──"
            else
              echo "── ℹ️ INFO ──"
            fi
            echo "$comment" | head -10
            echo ""
          done <<< "$COMMENTS"

          echo "=== Summary: $TOTAL findings ($CRITICAL critical, $MAJOR major, $MINOR minor) ==="
          echo "NOTE: CodeRabbit findings are informational only — they do not block merge."

# Agent-Alpha Security Audit — nightly + manual trigger
#
# Slow security scans that don't need to run per-PR:
#   - Trivy  — container image CVE scan (pgvector, redis) → SARIF → Security tab
#   - Syft   — SBOM generation (SPDX + CycloneDX) → artifact + summary
#   - Nuclei — DAST scan against beta lab app → SARIF → Security tab + Issue
#
# Enterprise pattern: fast scans (bandit/pip-audit/gitleaks) block in ci.yml
# per-PR; slow scans run nightly and report to the Security tab.
#
# Runs on a SELF-HOSTED runner on the Oracle ARM64 box.

name: Security Audit

on:
  schedule:
    - cron: '0 2 * * *'  # nightly 02:00 UTC
  workflow_dispatch: {}   # manual trigger from Actions tab

concurrency:
  group: security-audit-oracle-box
  cancel-in-progress: false

jobs:
  security-audit:
    runs-on: [self-hosted, linux, ARM64]
    permissions:
      security-events: write  # upload SARIF to Security tab
      actions: read
      contents: read
      issues: write            # auto-create Issue for Nuclei findings

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache venv + pip
        uses: actions/cache@v6
        with:
          path: |
            .venv
            ~/.cache/pip
          key: venv-arm64-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            venv-arm64-

      - name: Create venv + install deps (Python 3.12)
        run: |
          if [ ! -f .venv/bin/python ]; then
            python3.12 -m venv .venv
            .venv/bin/pip install --upgrade pip
          fi
          .venv/bin/pip install -e . --quiet
          .venv/bin/pip install flask --quiet  # beta_lab_app dependency

      - name: Cache security tool binaries
        id: cache-secbin
        uses: actions/cache@v6
        with:
          path: /tmp/secbin
          key: secbin-arm64-v3

      - name: Install security tools (if not cached)
        if: steps.cache-secbin.outputs.cache-hit != 'true'
        run: |
          rm -rf /tmp/secbin
          mkdir -p /tmp/secbin
          # Trivy — direct binary download (install.sh unreliable on self-hosted)
          curl -sfL https://github.com/aquasecurity/trivy/releases/download/v0.72.0/trivy_0.72.0_Linux-ARM64.tar.gz -o /tmp/trivy.tar.gz
          tar xzf /tmp/trivy.tar.gz -C /tmp/secbin trivy
          rm -f /tmp/trivy.tar.gz
          # Syft — direct binary download
          curl -sfL https://github.com/anchore/syft/releases/download/v1.46.0/syft_1.46.0_linux_arm64.tar.gz -o /tmp/syft.tar.gz
          tar xzf /tmp/syft.tar.gz -C /tmp/secbin syft
          rm -f /tmp/syft.tar.gz
          # Nuclei — direct binary download
          curl -sfL https://github.com/projectdiscovery/nuclei/releases/download/v3.11.0/nuclei_3.11.0_linux_arm64.zip -o /tmp/nuclei.zip
          unzip -o /tmp/nuclei.zip -d /tmp/secbin nuclei
          rm -f /tmp/nuclei.zip
          chmod +x /tmp/secbin/*

      # --- Trivy: container CVE scan → SARIF → Security tab ---
      - name: Container scan (Trivy — CVE scan on Docker images used in CI)
        run: |
          export PATH="/tmp/secbin:$PATH"
          # Digest-pinned to pg16-trixie (ARM64) with Go 1.25.12+ to fix CVE-2025-68121 (CRITICAL)
          # and 14 HIGH Go stdlib CVEs. See docs/ADR.md §12.35 for CVE decision + residuals.
          # --ignorefile .trivyignore: suppresses 16 gosu Go stdlib CVEs (ADR §12.35).
          # gosu is a startup-only privilege helper, not network-reachable. DB is 127.0.0.1-bound.
          trivy image --severity HIGH,CRITICAL --ignore-unfixed --ignorefile .trivyignore --format sarif -o trivy-results.sarif pgvector/pgvector:pg16-trixie@sha256:d0b40f6862437359b69f0ed790ce620d0226e220994c0e7349702d04dc1eb548
          trivy image --severity HIGH,CRITICAL --ignore-unfixed --format sarif -o trivy-redis.sarif redis:8-alpine
          # Also print human-readable summary to job log
          # FAIL on FIXED CVEs (--exit-code 1) — future fixable CVEs should block CI.
          # Run both scans first, then fail if either found fixable CVEs (so both
          # results are visible in the log even when one fails).
          TRIVY_FAIL=0
          echo "### Trivy: pgvector/pgvector:pg16-trixie@sha256:d0b40f6862437359b69f0ed790ce620d0226e220994c0e7349702d04dc1eb548"
          trivy image --severity HIGH,CRITICAL --ignore-unfixed --ignorefile .trivyignore --exit-code 1 pgvector/pgvector:pg16-trixie@sha256:d0b40f6862437359b69f0ed790ce620d0226e220994c0e7349702d04dc1eb548 || TRIVY_FAIL=1
          echo "### Trivy: redis:8-alpine"
          trivy image --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 redis:8-alpine || TRIVY_FAIL=1
          if [ "$TRIVY_FAIL" -eq 1 ]; then exit 1; fi

      - name: Upload Trivy SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-pgvector

      - name: Upload Trivy Redis SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-redis.sarif
          category: trivy-redis

      # --- Syft: SBOM generation → artifact + job summary ---
      - name: Generate SBOM (Syft — Software Bill of Materials)
        if: ${{ !cancelled() }}
        run: |
          export PATH="/tmp/secbin:$PATH"
          syft dir:. --output spdx-json=sbom.spdx.json
          syft dir:. --output cyclonedx-json=sbom.cyclonedx.json
          # Write package count to job summary
          PKG_COUNT=$(syft dir:. --output json 2>/dev/null | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('artifacts',[])))" 2>/dev/null || echo "unknown")
          echo "## SBOM Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Packages detected: $PKG_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- SPDX: sbom.spdx.json" >> $GITHUB_STEP_SUMMARY
          echo "- CycloneDX: sbom.cyclonedx.json" >> $GITHUB_STEP_SUMMARY

      - name: Upload SBOM artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: |
            sbom.spdx.json
            sbom.cyclonedx.json
          retention-days: 90

      # --- Nuclei: DAST scan → SARIF → Security tab + auto-Issue ---
      - name: DAST scan (Nuclei — scan beta lab app for web vulnerabilities)
        if: ${{ !cancelled() }}
        run: |
          export PATH="/tmp/secbin:$PATH"
          # Beta lab app listens on port 80 by default; use port 5000 via override
          .venv/bin/python -c "from infra.beta_lab_app import app; app.run(host='127.0.0.1', port=5000)" &
          APP_PID=$!
          # Wait for app to be ready (up to 10 seconds)
          for i in $(seq 1 10); do
            if curl -sf http://localhost:5000/login >/dev/null 2>&1; then
              echo "Beta lab app is ready on port 5000"
              break
            fi
            sleep 1
          done
          # Verify app is actually responding
          if ! curl -sf http://localhost:5000/login >/dev/null 2>&1; then
            echo "::warning::Beta lab app did not start — skipping Nuclei scan"
            echo "No Nuclei findings (app unavailable)" > nuclei-results.txt
            kill $APP_PID 2>/dev/null || true
            exit 0
          fi
          # Run Nuclei with JSON output for SARIF conversion
          nuclei -u http://localhost:5000 -severity medium,high,critical -j -o nuclei-results.jsonl || true
          kill $APP_PID 2>/dev/null || true
          # Display findings in job log
          if [ -s nuclei-results.jsonl ]; then
            echo "### Nuclei findings:"
            cat nuclei-results.jsonl
            # Convert JSONL to SARIF for Security tab upload
            python3 - <<'PYEOF'
          import json, sys
          results = []
          with open("nuclei-results.jsonl") as f:
              for line in f:
                  if line.strip():
                      r = json.loads(line)
                      results.append({
                          "ruleId": r.get("template-id", "nuclei-unknown"),
                          "level": "error" if r.get("info", {}).get("severity") in ("critical","high") else "warning",
                          "message": {"text": r.get("info", {}).get("name", "Nuclei finding")},
                          "locations": [{
                          "physicalLocation": {
                              "artifactLocation": {"uri": "infra/beta_lab_app.py"},
                              "region": {"startLine": 1}
                          }}]
                      })
          sarif = {
              "version": "2.1.0",
              "runs": [{
                  "tool": {"driver": {"name": "Nuclei", "version": "3.11.0"}},
                  "results": results
              }]
          }
          with open("nuclei-results.sarif", "w") as f:
              json.dump(sarif, f)
          print(f"Converted {len(results)} Nuclei findings to SARIF")
          PYEOF
          else
            echo "No Nuclei findings"
            # Write empty SARIF so the upload step doesn't fail
            echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Nuclei"}},"results":[]}]}' > nuclei-results.sarif
          fi

      - name: Upload Nuclei SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: nuclei-results.sarif
          category: nuclei-dast

      - name: Create GitHub Issue for Nuclei findings
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -s nuclei-results.jsonl ]; then
            echo "No Nuclei findings — skipping Issue creation"
            exit 0
          fi
          FINDING_COUNT=$(wc -l < nuclei-results.jsonl)
          cat > /tmp/nuclei-issue-body.md << 'ISSUEEOF'
          ## Nuclei DAST Scan Results

          The nightly security audit found finding(s) when scanning the beta lab app.

          ### Findings

          ```json
          ISSUEEOF
          cat nuclei-results.jsonl >> /tmp/nuclei-issue-body.md
          cat >> /tmp/nuclei-issue-body.md << 'ISSUEEOF2'
          ```

          View full details in the Security tab.

          ISSUEEOF2
          echo "Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> /tmp/nuclei-issue-body.md
          gh issue create \
            --title "[Security Audit] Nuclei DAST: $FINDING_COUNT finding(s) on beta lab app" \
            --label security \
            --body-file /tmp/nuclei-issue-body.md || true


# CodeQL — GitHub native SAST for Python
# Complements bandit with taint-flow analysis (SQL injection, XSS, path traversal).
# Free for public repos. Runs on every push/PR to main + weekly schedule.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0"  # Weekly: Sunday midnight UTC

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          # CodeQL owns SECURITY (taint analysis); ruff (make check) owns QUALITY.
          # security-and-quality double-counted quality noise CodeQL is bad at
          # (Protocol `...`, dataclass field-doc strings) — 55 of 68 alerts were
          # quality FPs. security-extended keeps deep security queries, drops the noise.
          queries: security-extended
          # Scope analysis to the shipped product only (see config for rationale)
          config-file: ./.github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

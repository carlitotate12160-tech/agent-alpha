worker_processes auto;
events { worker_connections 1024; }

http {
    access_log /var/log/nginx/access.log;

    ssl_certificate     /etc/nginx/certs/backup-lab.crt;
    ssl_certificate_key /etc/nginx/certs/backup-lab.key;

    # vuln.backup.lab — leaked backup config files ARE served (misconfig).
    # nginx has no rule to hide dotfiles/backup suffixes, so /.env.bak is public.
    server {
        listen 443 ssl;
        server_name vuln.backup.lab;
        root /etc/nginx/sites/vuln;
        location / { try_files $uri $uri/ =404; }
    }

    # hardened.backup.lab — same app, backup/dotfiles explicitly denied (true-neg).
    server {
        listen 443 ssl;
        server_name hardened.backup.lab;
        root /etc/nginx/sites/hardened;

        # Belt-and-suspenders: never serve backup suffixes or dotfiles.
        location ~ \.(bak|old|save|orig|swp|~)$ { return 404; }
        location ~ /\.(?!well-known) { return 404; }

        location / { try_files $uri $uri/ =404; }
    }
}

# recon_lab — self-owned real-condition lab (nginx multi-vhost on 127.0.0.1:443).
# Mirror of odoo_lab/backup_lab pattern. Run: ./seed.sh && docker compose up -d
services:
  recon-nginx:
    image: nginx:1.27-alpine
    container_name: recon_lab_nginx
    ports:
      - "127.0.0.1:443:443"      # bind LOOPBACK only — never expose the lab publicly
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./exposed:/etc/nginx/exposed:ro
      - ./certs:/etc/nginx/certs:ro
    restart: unless-stopped

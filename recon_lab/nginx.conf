# recon_lab — real-world-condition lab for the Try Harder (D2-b) field-prove.
# Each vhost embeds ONE real-condition archetype a clean lab omits (why clean labs
# pass but the real internet broke us). All on 127.0.0.1:443 via SNI.
#
#  apex.recon.lab      landing + 301 redirect noise            — crawl seed
#  late.recon.lab      CORE: boring root, leak at /.env.bak    — greedy MISSES, Try Harder WINS
#  waf.recon.lab       Cloudflare JS challenge (200 + markers) — Bug #18 CHALLENGE archetype
#  decoy.recon.lab     /.env.bak present but EMPTY             — FP trap (anti-#3 true-negative)
#  dead.recon.lab      503 always                              — dead sibling -> live target sorts late (§12.24)
#  hardened.recon.lab  clean, no leak                          — true-negative
events {}
http {
  server {
    listen 443 ssl; server_name apex.recon.lab;
    ssl_certificate /etc/nginx/certs/recon-lab.crt; ssl_certificate_key /etc/nginx/certs/recon-lab.key;
    location = /     { root /etc/nginx/exposed/apex; index index.html; }
    location = /home { return 301 https://apex.recon.lab/; }
    location /       { return 404 "Not Found - recon.lab boilerplate\n"; default_type text/plain; }
  }
  # late — THE DIFFERENTIAL: boring root (greedy moves on; run_recon deep-seeds ONLY the
  # root host, never this discovered-late sibling), leak reachable ONLY via Try Harder.
  server {
    listen 443 ssl; server_name late.recon.lab;
    ssl_certificate /etc/nginx/certs/recon-lab.crt; ssl_certificate_key /etc/nginx/certs/recon-lab.key;
    location = /         { return 200 "<html><body><h1>late.recon.lab</h1><p>Marketing page. Nothing to see.</p></body></html>"; default_type text/html; }
    location = /.env.bak { root /etc/nginx/exposed/late; default_type text/plain; }
    location /           { return 404 "Not Found - recon.lab boilerplate\n"; default_type text/plain; }
  }
  # waf — Cloudflare JS challenge on everything (Bug #18): classify_response -> CHALLENGE.
  server {
    listen 443 ssl; server_name waf.recon.lab;
    ssl_certificate /etc/nginx/certs/recon-lab.crt; ssl_certificate_key /etc/nginx/certs/recon-lab.key;
    add_header Server "cloudflare" always; add_header cf-mitigated "challenge" always;
    location / { root /etc/nginx/exposed/waf; try_files /challenge.html =503; default_type text/html; }
  }
  # decoy — FP trap: /.env.bak exists but carries NO secret (leak_extraction mints 0).
  server {
    listen 443 ssl; server_name decoy.recon.lab;
    ssl_certificate /etc/nginx/certs/recon-lab.crt; ssl_certificate_key /etc/nginx/certs/recon-lab.key;
    location = /         { return 200 "<html><body>decoy</body></html>"; default_type text/html; }
    location = /.env.bak { root /etc/nginx/exposed/decoy; default_type text/plain; }
    location /           { return 404 "Not Found - recon.lab boilerplate\n"; default_type text/plain; }
  }
  # dead — 503 always: dud sibling so the live target does not sort first (§12.24 realism).
  server {
    listen 443 ssl; server_name dead.recon.lab;
    ssl_certificate /etc/nginx/certs/recon-lab.crt; ssl_certificate_key /etc/nginx/certs/recon-lab.key;
    location / { return 503 "Service Unavailable\n"; default_type text/plain; }
  }
  # hardened — clean control (true-negative): no leak anywhere.
  server {
    listen 443 ssl; server_name hardened.recon.lab;
    ssl_certificate /etc/nginx/certs/recon-lab.crt; ssl_certificate_key /etc/nginx/certs/recon-lab.key;
    location = / { return 200 "<html><body>hardened.recon.lab</body></html>"; default_type text/html; }
    location /   { return 404 "Not Found - recon.lab boilerplate\n"; default_type text/plain; }
  }
}

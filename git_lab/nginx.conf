worker_processes auto;
events { worker_connections 1024; }

http {
    access_log /var/log/nginx/access.log;

    ssl_certificate     /etc/nginx/certs/git-lab.crt;
    ssl_certificate_key /etc/nginx/certs/git-lab.key;

    # vuln.git.lab — serves a docroot that includes a real .git repository
    server {
        listen 443 ssl;
        server_name vuln.git.lab;

        root /etc/nginx/sites/vuln;
        location / {
            try_files $uri $uri/ =404;
        }
    }

    # hardened.git.lab — same docroot shape but NO exposed /.git (true-negative)
    server {
        listen 443 ssl;
        server_name hardened.git.lab;

        root /etc/nginx/sites/hardened;

        # Belt-and-suspenders: even if a .git directory appears, never serve it.
        location ~ ^/.git/ {
            return 404;
        }

        location / {
            try_files $uri $uri/ =404;
        }
    }
}

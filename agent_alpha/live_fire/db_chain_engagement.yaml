# Example engagement config for the DIRECT-DB cred-reuse field-prove.
# Fill from the SIGNED SOW. Run on Oracle:
#   .venv/bin/python3 -m agent_alpha.live_fire.db_chain_runner db_chain_engagement.yaml
#
# HARD RULES (the runner enforces / relies on):
#   - db_endpoints host MUST be a real, self-owned, in-scope MySQL — NEVER localhost /
#     127.0.0.1 (the runner refuses loopback; the factory exists to block DB_HOST traps).
#   - scope always comes from the signed SOW — never auto-filled, never example.com.
#   - the DB host:port must be reachable from the Oracle box.

client_id: "selfowned-lab-01"

scope:
  ip_ranges:
    - "10.0.0.0/24"            # the authorized internal range (Oracle box is 10.0.0.19)
  domains:
    - "10.0.0.19"              # the Oracle box hosting mock debug page + MySQL
  db_endpoints:
    - "10.0.0.19:3306"         # Docker MySQL on Oracle — NOT localhost

# Where Alpha harvests the leaked DB credential (mock Laravel debug page).
recon_url: "http://10.0.0.19:8080/trigger-error"

# An in-scope web URL Beta observes to trigger cred_reuse (mock login page).
entry_point: "http://10.0.0.19:8080/login"

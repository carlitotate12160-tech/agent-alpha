# RULE-tier playbook (Opsi B). Pure data — no code, no LLM.
# Fires when an Odoo surface is fingerprinted, so the deterministic path can
# reach the odoo_dbmanager_probe recon vector (anti-#2: production selection).
name: odoo_dbmanager_exposure
version: 1
phase: recon
# Any one indicator is sufficient (logical OR). Odoo-specific asset markers —
# NOT a loose "/static/" that would fire on unrelated stacks (anti-#3 over-probe).
priority: 50
match:
  any_indicator:
    - body_contains: "/web/static/"
    - body_regex: 'web\.assets_(common|backend|frontend)'
    - body_contains: "odoo.define"
    - body_contains: "/web/login"
action:
  tool: odoo_dbmanager_probe
  tier: rule
  technique_id: "T1595.002"   # MITRE ATT&CK: Active Scanning — Software
  rationale: "Odoo detected; probe /web/database/manager for an exposed database manager."

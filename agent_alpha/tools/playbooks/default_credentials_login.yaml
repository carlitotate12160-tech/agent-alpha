# RULE-tier playbook (Opsi B). Pure data — no code, no LLM.
# Lets Beta's orchestrator.decide() return a DETERMINISTIC decision when a login
# surface is observed — so Beta runs with NO LLM tier (works with the DeepSeek key
# revoked; "rule hit skips LLM entirely"). Beta.step then runs DefaultCredsTool.
# Mechanism-agnostic: this only DETECTS a login surface; how the credential is
# applied (form / JSON / Basic) is the tool's job.
#
# Bug #14: the original indicator set included "Sign in" / "Sign In" / "Log in" /
# "Login" as bare body-text substrings. Those are NAV-CHROME text — they appear on
# nearly every page of nearly every site (header/footer login link), not just an
# actual login page. In the field this matched 75/162 pages on a real engagement,
# including plain article/blog pages, and — because RULE always pre-empts the LLM
# tier (see orchestrator.decide()) — silently starved the LLM tier for that entire
# host. Kept: `type="password"` (a REAL password <input> exists on THIS page — a
# functional signal, not chrome text) and "Grafana" (a specific product fingerprint,
# not generic nav text). If a genuine login page has neither (e.g. a password field
# injected client-side by JS the static crawler never renders — see the SPA-blind-spot
# gap), it now correctly falls through to the LLM tier instead of forcing a rule hit.
name: default_credentials_login
version: 2
phase: access
# Any one indicator is sufficient (logical OR). Substring match, case-sensitive.
match:
  any_indicator:
    - body_contains: 'type="password"'
    - body_contains: "type='password'"
    - body_contains: "Grafana"
action:
  tool: default_creds
  tier: rule
  technique_id: "T1078.001"   # MITRE ATT&CK: Valid Accounts — Default Accounts
  rationale: "Login surface detected; attempt known default credentials."
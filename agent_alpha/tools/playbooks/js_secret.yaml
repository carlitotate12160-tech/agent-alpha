# RULE-tier playbook (Opsi B). Pure data — no code, no LLM.
# The PlaybookEngine matches an observation against `match` and, on a hit,
# returns the `action` verbatim. Deterministic by construction.
#
# SPA/BUNDLE-SPECIFIC indicators only — NEVER a bare "<script>" indicator.
# A plain page with an ordinary <script src="/app.js"> must NOT fire this rule
# (anti-#3 over-probing). The indicators below are distinctive of SPA builds:
#   - Hashed JS chunk filenames (e.g. main.a1b2c3d4.js) — build-tool output
#   - SPA root mount points (<div id="root">, <div id="app">) — framework shells
name: js_secret_bundle_exposure
version: 1
phase: recon
match:
  any_indicator:
    - body_regex: '\.[0-9a-f]{8,}\.js'
    - body_contains: '<div id="root">'
    - body_contains: '<div id="app">'
action:
  tool: js_secret_probe
  tier: rule
  technique_id: "T1595.002"   # MITRE ATT&CK: Active Scanning — Software
  rationale: "SPA bundle detected; scan JS chunks for hardcoded secrets/API keys."

# RULE-tier header-fingerprint (Header-matcher slice-1). Pure data -- no LLM.
# Fires on an HTTP Basic auth challenge (WWW-Authenticate: Basic ...). DETECT only:
# records the protected surface; it does NOT submit or guess credentials (a gated
# Beta/Gamma action). Empty-body 401s are routed through the RULE tier by scout
# (Verdict.EMPTY follows the same rule-only path as NOT_FOUND), so this rule now
# fires even when the body is blank — the slice-1 limitation is resolved.
name: http_basic_auth_challenge
version: 1
phase: recon
match:
  any_indicator:
    - header_regex:
        name: WWW-Authenticate
        value: '(?i)^basic\b'
action:
  tool: http_basic_auth_fingerprint
  tier: rule
  technique_id: "T1595.002"
  rationale: "HTTP Basic auth challenge detected; record the protected surface for scoping."

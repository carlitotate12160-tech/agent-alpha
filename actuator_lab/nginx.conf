worker_processes auto;
events { worker_connections 1024; }

http {
    access_log /var/log/nginx/access.log;

    ssl_certificate     /etc/nginx/certs/actuator-lab.crt;
    ssl_certificate_key /etc/nginx/certs/actuator-lab.key;

    # vuln.actuator.lab — Actuator /env exposed WITH unmasked datasource credentials.
    server {
        listen 443 ssl;
        server_name vuln.actuator.lab;
        root /etc/nginx/sites/vuln;
        default_type application/json;
        location / { try_files $uri $uri/ =404; }
    }

    # hardened.actuator.lab — /env exposed but values MASKED (******) = true-negative.
    server {
        listen 443 ssl;
        server_name hardened.actuator.lab;
        root /etc/nginx/sites/hardened;
        default_type application/json;
        location / { try_files $uri $uri/ =404; }
    }
}

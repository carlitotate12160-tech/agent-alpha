# Live-fire engagement config (sample / test fixture).
# In a real engagement this is the single auditable place that holds the
# authorized scope + targets + ground truth. Hosts MUST be authorized by the SOW.
client_id: "lab_client"
scope:
  ip_ranges: ["10.0.0.0/30"]
  domains: ["lab-target.invalid", "hardened.invalid"]
targets:
  - url: "https://lab-target.invalid/trigger-error"
    host: "lab-target.invalid"
    ground_truth_vulnerable: true     # APP_DEBUG=true -> should be detected (TP)
  - url: "https://hardened.invalid/trigger-error"
    host: "hardened.invalid"
    ground_truth_vulnerable: false    # hardened -> must NOT be flagged (TN)

# Agent-Alpha CI — P1.1 (pre-Phase-3 hardening)
#
# Runs the FULL test suite + make check (ruff + mypy) on every push / PR.
# A red run blocks merge (enable branch protection — see SETUP below).
#
# Runs on a SELF-HOSTED runner on the Oracle ARM64 box, because the project's
# hard rule is "Oracle ARM64 is the only valid test environment" (anti-Lyndon
# #9). CI literally runs on the deployment env, not a look-alike.
#
# SETUP (one-time, your part):
#   1. GitHub repo → Settings → Actions → Runners → "New self-hosted runner".
#      Register it ON the Oracle box with labels: self-hosted, linux, ARM64.
#      Run it as a service:  sudo ./svc.sh install && sudo ./svc.sh start
#   2. Settings → Branches → add a branch protection rule for `main`:
#      "Require status checks to pass before merging" → select "quality-gate".
#   3. (optional) Settings → Secrets → add DEEPSEEK_API_KEY to also run the 2
#      live tests; without it they SKIP (acceptable, not a failure).
#
# SECURITY: a self-hosted runner executes workflow code on the Oracle box.
# Keep the runner scoped to THIS repo. Do NOT enable auto-run of workflows from
# forked-PRs on a self-hosted runner (untrusted code on your infra). For a
# private solo repo this is fine; revisit if you add external contributors.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: [self-hosted, linux, ARM64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create venv + install deps (Python 3.12)
        run: |
          python3.12 -m venv .venv
          .venv/bin/pip install --upgrade pip
          # Project runtime deps (from pyproject [project.dependencies]).
          .venv/bin/pip install -e .
          # Dev/CI tools (kept out of runtime deps on purpose).
          .venv/bin/pip install ruff mypy pytest grpcio-tools

      - name: Generate A2A protobuf stubs (a2a_pb2 is generated, not committed)
        run: make proto

      - name: Lint + typecheck (make check = ruff + ruff format --check + mypy)
        run: make check

      - name: Full test suite (all phases, Oracle ARM64)
        env:
          # If the secret is set, the 2 live DeepSeek tests run; else they SKIP.
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: .venv/bin/pytest tests/ -q

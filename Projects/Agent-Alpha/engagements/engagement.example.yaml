# ─────────────────────────────────────────────────────────────────────────────
# Agent-Alpha — Engagement config (live-fire)   [Phase 2 exit criteria #2]
#
# Consumed by: agent_alpha/live_fire/runner.py  ->  load_engagement_config()
# Run with:    DEEPSEEK_API_KEY=... .venv/bin/python3 -m agent_alpha.live_fire.runner \
#                  engagements/<your-file>.yaml      # Oracle ARM64 only
#
# AUTHORIZATION RULE (non-negotiable): every host/domain below MUST come from a
# SIGNED SOW for systems YOU control. Scope is NEVER auto-discovered or guessed.
# Do NOT point this at example.com or anything you do not own. .invalid hosts
# below are PLACEHOLDERS — replace them; .invalid never resolves and will only
# exercise the FAILED path, not a real finding.
#
# Schema is STRICT — load_engagement_config() raises ValueError on a missing key.
# Required: client_id, scope.ip_ranges, scope.domains, and per target:
#           url, host, ground_truth_vulnerable.
#
# THREE GOTCHAS that silently ruin a run (read these):
#   1. host MUST equal urlparse(url).hostname EXACTLY (lowercase, no port/path).
#      Alpha derives the host from `url` for its scope gate; scoring keys ground
#      truth on `host`. If they disagree, the target is mis-scored.
#   2. EVERY target host MUST appear in scope.domains, or Alpha's scope gate
#      returns BLOCKED -> findings_count 0 -> counted as "predicted not vulnerable"
#      (a silent false negative), NOT an error you'll notice.
#   3. scope.ip_ranges MUST be non-empty and total <= MAX_SCOPE_IPS (256), even
#      when you target by domain. Put each target's resolved IP as a /32.
# ─────────────────────────────────────────────────────────────────────────────

client_id: "client_acme_lab"          # FILL: identifier from the SOW (free-form string)

scope:
  # Authorized network ranges (CIDR). Non-empty, <= 256 IPs total.
  # For domain targets, list each target's resolved IP as a /32.
  ip_ranges:
    - "203.0.113.10/32"               # FILL: resolved IP of target #1  (203.0.113.0/24 = TEST-NET-3, replace)
    - "203.0.113.11/32"               # FILL: resolved IP of target #2
    - "203.0.113.12/32"               # FILL: resolved IP of target #3
  # Authorized hostnames. MUST include every target host below (exact match).
  domains:
    - "lab1.acme-redteam.test"        # FILL: must equal targets[0].host
    - "lab2.acme-redteam.test"        # FILL: must equal targets[1].host
    - "lab3.acme-redteam.test"        # FILL: must equal targets[2].host

# Three targets = the Phase 2 exit-criteria minimum. Mix ground truth so the run
# exercises both a real finding (TP) and a clean target (TN), proving Alpha
# *reads* and distinguishes rather than flagging everything.
targets:
  # ── Target #1: Laravel APP_DEBUG=true  (KNOWN vulnerable) ──────────────────
  - url: "https://lab1.acme-redteam.test/trigger-error"   # a route that throws -> Whoops debug page
    host: "lab1.acme-redteam.test"                         # == urlparse(url).hostname
    ground_truth_vulnerable: true

  # ── Target #2: Laravel APP_DEBUG=true  (KNOWN vulnerable) ──────────────────
  - url: "https://lab2.acme-redteam.test/trigger-error"
    host: "lab2.acme-redteam.test"
    ground_truth_vulnerable: true

  # ── Target #3: hardened (APP_DEBUG=false)  (KNOWN clean) ───────────────────
  # Same probe, no debug leak -> Alpha must conclude NO finding. If it flags
  # this, that's a false positive and drives fp_rate up.
  - url: "https://lab3.acme-redteam.test/trigger-error"
    host: "lab3.acme-redteam.test"
    ground_truth_vulnerable: false

# ─────────────────────────────────────────────────────────────────────────────
# PASS condition: fp_rate_of_findings = FP / (TP + FP) < MAX_FP_RATE (0.20).
# With the mix above (2 vulnerable + 1 clean), a correct run yields TP=2, FP=0,
# FN=0, TN=1 -> fp_rate 0.0 -> PASS. The scorecard + report.pdf print on exit.
# ─────────────────────────────────────────────────────────────────────────────

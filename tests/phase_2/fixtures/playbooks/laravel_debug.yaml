# RULE-tier playbook (Opsi B). Pure data — no code, no LLM.
# The PlaybookEngine matches an observation against `match` and, on a hit,
# returns the `action` verbatim. Deterministic by construction.
name: laravel_debug_exposure
version: 1
phase: recon
# Any one indicator is sufficient (logical OR).
match:
  any_indicator:
    - body_contains: "Whoops"
    - body_contains: "Illuminate\\"
    - body_regex: "Laravel v[0-9]+"
action:
  tool: laravel_debug_probe
  tier: rule
  technique_id: "T1592.002"   # MITRE ATT&CK: Gather Victim Host Info — Software
  rationale: "Laravel debug page detected; confirm APP_DEBUG=true env leak."

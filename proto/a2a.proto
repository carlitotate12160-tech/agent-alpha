// proto/a2a.proto
// SINGLE SOURCE OF TRUTH for all Agent-Alpha inter-agent communication.
// Python and Go both generate from this file — they import generated code
// only, never redefine these types.
//
// Phase 0 scope ONLY: core enums, A2AMessage envelope, single canonical
// HandoffPayload, authorization + emergency-stop contracts, ConductorService.
// No per-agent handoff variants. No per-agent service RPCs (Phase 1+).

syntax = "proto3";

package agent_alpha.a2a;

option go_package = "github.com/carlitotate12160-tech/agent-alpha/proto/a2a";

// ── Enums (every enum has a zero-value default) ───────────────

enum EngagementState {
  CREATED            = 0;
  RECON_ONLY         = 1;
  ACTIVE_APPROVED    = 2;
  OFFENSIVE_APPROVED = 3;
  EMERGENCY_STOP     = 4;
}

enum AgentRole {
  CONDUCTOR = 0;
  ALPHA     = 1;
  BETA      = 2;
  GAMMA     = 3;
  DELTA     = 4;
  EPSILON   = 5;
  OMEGA     = 6;
}

enum MessageType {
  HANDOFF_READY      = 0;
  STATUS_UPDATE      = 1;
  ERROR              = 2;
  REQUEST_APPROVAL   = 3;
  EMERGENCY_STOP_CMD = 4;
}

enum PhaseStatus {
  PENDING  = 0;
  RUNNING  = 1;
  COMPLETE = 2;
  FAILED   = 3;
  BLOCKED  = 4;
}

// ── Core envelope ─────────────────────────────────────────────

message A2AMessage {
  string      engagement_id  = 1;
  AgentRole   from_agent     = 2;
  AgentRole   to_agent       = 3;
  MessageType message_type   = 4;
  string      timestamp_utc  = 5;
  bytes       payload        = 6;
  float       confidence     = 7;
  bool        requires_human = 8;
}

// ── Handoff — single canonical type, no per-agent variants ────

message HandoffPayload {
  string          from_phase       = 1;
  string          to_phase         = 2;
  PhaseStatus     status           = 3;
  int32           findings_count   = 4;
  bytes           handoff_data     = 5;
  repeated string proof_artifacts  = 6;
  AgentRole       next_recommended = 7;
  float           confidence       = 8;
}

// ── Authorization ─────────────────────────────────────────────

message AuthTransitionRequest {
  string          engagement_id = 1;
  EngagementState target_state  = 2;
  string          requested_by  = 3;
  bytes           sow_hash      = 4;
}

message AuthTransitionResponse {
  bool            approved  = 1;
  EngagementState new_state = 2;
  string          reason    = 3;
  string          event_id  = 4;
}

message EmergencyStopRequest {
  string engagement_id = 1;
  string reason        = 2;
  string issued_by     = 3;
}

message EngagementStateRequest { string engagement_id = 1; }

message EngagementStateResponse {
  string          engagement_id = 1;
  EngagementState state         = 2;
  string          updated_at    = 3;
}

// ── Service — Conductor only ──────────────────────────────────

service ConductorService {
  rpc RequestAuthTransition (AuthTransitionRequest)  returns (AuthTransitionResponse);
  rpc EmergencyStop         (EmergencyStopRequest)   returns (AuthTransitionResponse);
  rpc GetEngagementState    (EngagementStateRequest) returns (EngagementStateResponse);
}
